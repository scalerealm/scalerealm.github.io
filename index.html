<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale Realm Ltd | Software Development</title>
    <link rel="icon" href="scale_realm_logo.svg" type="image/svg+xml">
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #0F172A;
            --secondary-text: #64748B;
            --accent-color: #007AFF;
            --border-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow-y: scroll; /* Prevents layout jump when switching between pages */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7); }
            70% { transform: scale(1.2); opacity: 0.7; box-shadow: 0 0 0 10px rgba(0, 122, 255, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
        }

        /* --- Main Content (Perfectly Centered) --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            width: 100%;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            background-color: #F0F7FF;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2.5s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }
        
        .subtitle {
            font-size: 1.125rem;
            color: var(--secondary-text);
            max-width: 480px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .contact-link {
            font-size: 0.95rem;
            color: var(--text-color);
            font-weight: 500;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .contact-link:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* --- Footer --- */
        footer {
            padding: 2rem;
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.85rem;
            border-top: 1px solid transparent; /* Keeps layout consistent if privacy has a border */
        }

        .footer-links {
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .footer-links a {
            color: var(--secondary-text);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--text-color);
            text-decoration: underline;
        }

        .legal-block {
            font-size: 0.75rem;
            line-height: 1.6;
            color: #94A3B8;
        }
    </style>
</head>
<body>

    <main>
        <div class="status-badge">
            <span class="status-dot"></span>
            Private Development
        </div>

        <h1>Scale Realm Ltd</h1>
        
        <div class="subtitle">
            Building scalable and maintainable software systems.
        </div>
        
        <a href="mailto:info@scalerealm.co.uk" class="contact-link">Contact: info@scalerealm.co.uk</a>
    </main>

    <footer>
        <div class="footer-links">
            &copy; 2026 Scale Realm Ltd. &nbsp;|&nbsp; <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="legal-block">
            Scale Realm Ltd is registered in England and Wales (Company No. 17078017)<br>
            71-75 Shelton Street, Covent Garden, London, WC2H 9JQ
        </div>
    </footer>

</body>
</html>
